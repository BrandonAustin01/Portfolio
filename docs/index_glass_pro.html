<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Liquid Glass PRO Demo</title>
    <link rel="stylesheet" href="assets/css/glass-pro.css" />
    <style>
      body {
        margin: 0;
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto,
          "Inter", "SF Pro", Arial;
        color: #eef0f3;
      }
      h1 {
        font-size: clamp(2rem, 6vw, 4rem);
        text-align: center;
        margin: 2.5rem 1rem 0.25rem;
      }
      p.lead {
        text-align: center;
        margin: 0 1rem 2rem;
        opacity: 0.9;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
        gap: 1.25rem;
        width: min(1100px, 92%);
        margin: 0 auto 4rem;
      }
    </style>
  </head>
  <body class="lg-noise lg-scene">
    <div class="lg-blob a"></div>
    <div class="lg-blob b"></div>
    <div class="lg-blob c"></div>

    <h1>Liquid Glass • iOS 26</h1>
    <p class="lead">
      Frosted tiles with curved gloss, inner ring, diagonal sheen, and vibrant
      tints.
    </p>

    <main class="grid">
      <section class="lg-tile lg-gloss lg-pad lg-hover lg-tint-blue">
        <div class="lg-title">Now Playing</div>
        <div class="lg-sub">Artist — Track Name</div>
        <div style="margin-top: 1rem">
          <span class="lg-capsule">
            <span class="dot"></span>
            <span>On Air</span>
          </span>
        </div>
      </section>

      <section class="lg-tile lg-gloss lg-pad lg-hover lg-tint-pink">
        <div class="lg-title">Connectivity</div>
        <div class="lg-sub">Wi‑Fi · Bluetooth · AirDrop</div>
      </section>

      <section class="lg-tile lg-gloss lg-pad lg-hover lg-tint-amber">
        <div class="lg-title">Widgets</div>
        <div class="lg-sub">Quick glance controls</div>
      </section>

      <section class="lg-tile lg-gloss lg-pad lg-hover">
        <div class="lg-title">Plain Glass</div>
        <div class="lg-sub">Use without tint for neutral panels.</div>
      </section>
    </main>
  </body>
</html>
